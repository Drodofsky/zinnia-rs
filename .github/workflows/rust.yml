name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          pipx install maturin

      - name: Create model directory
        shell: bash
        run: mkdir -p model

      - name: Download and unpack Tegaki model
        shell: bash
        run: |
          set -euo pipefail

          curl -L \
            "https://github.com/tegaki/tegaki/releases/download/v0.3/tegaki-zinnia-japanese-light-0.3.zip" \
            -o /tmp/tegaki-zinnia-japanese-light-0.3.zip

          unzip -o /tmp/tegaki-zinnia-japanese-light-0.3.zip -d /tmp/tegaki-model

          model_path="$(find /tmp/tegaki-model -name 'handwriting-ja.model' | head -n 1)"
          test -n "$model_path"
          cp "$model_path" model/handwriting-ja.model

      - name: Verify model exists
        shell: bash
        run: ls -l model && test -f model/handwriting-ja.model

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
